.back {

    #0000 0 calc(250%/13),var(--c1) 0 calc(300%/13);

  --_g1: repeating-linear-gradient(-45deg,var(--_g));

    var(--_g0),var(--_g0) var(--s) var(--s),
    var(--_g1),var(--_g1) var(--s) var(--s) var(--c2);

    }
